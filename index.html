<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0A0A0F" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="description" content="StreamHub TV — TV en vivo de todo el mundo + apps de streaming" />
  <title>StreamHub TV</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◈</text></svg>" />
  <link rel="manifest" href="/manifest.json" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root {
      width: 100%;
      height: 100%;
      background: #0A0A0F;
      color: #F0EDE8;
      font-family: 'Outfit', system-ui, -apple-system, sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    /* Prevent text selection on TV (remote nav) */
    body.tv-mode * {
      -webkit-user-select: none;
      user-select: none;
    }
    /* Loading screen while JS loads */
    #loading-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0A0A0F;
      z-index: 9999;
      transition: opacity 0.4s;
    }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }
    .boot-logo { font-size: 48px; color: #FF5A32; margin-bottom: 16px; }
    .boot-text { font-size: 20px; font-weight: 700; color: #F0EDE8; margin-bottom: 8px; }
    .boot-sub { font-size: 13px; color: #8A8798; }
    .boot-spinner {
      width: 32px; height: 32px; margin-top: 24px;
      border: 3px solid #1C1C2E;
      border-top-color: #FF5A32;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="boot-logo">◈</div>
    <div class="boot-text">StreamHub TV</div>
    <div class="boot-sub">Cargando...</div>
    <div class="boot-spinner"></div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    // Detect if running on Fire TV / Android TV
    if (navigator.userAgent.includes('AFT') || navigator.userAgent.includes('AndroidTV')) {
      document.body.classList.add('tv-mode');
    }
  </script>
</body>
</html>
